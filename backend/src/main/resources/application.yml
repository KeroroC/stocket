spring:
  application:
    name: stocket
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB
  modulith:
    events:
      republish-outstanding-events-on-restart: true
stocket:
  identity:
    cookie:
      name: STOCKET_SESSION
      secure: true
    session:
      idle-timeout: 30d
      absolute-timeout: 90d
      touch-interval: 5m
    invite:
      default-expiry: 24h
      frontend-url: ${STOCKET_FRONTEND_URL:}
    login:
      rate-limit-window: 15m
      max-failures: 10
  notification:
    worker-enabled: "${STOCKET_NOTIFICATION_WORKER_ENABLED:false}"
    worker-delay: "${STOCKET_NOTIFICATION_WORKER_DELAY:5s}"
    worker-batch-size: 50
    max-attempts: 8
    initial-backoff: 30s
    max-backoff: 24h
  reminder:
    due-job-enabled: "${STOCKET_REMINDER_DUE_JOB_ENABLED:false}"
    due-job-cron: "${STOCKET_REMINDER_DUE_JOB_CRON:0 * * * * *}"
  attachment:
    directory: "${STOCKET_ATTACHMENT_DIR:${java.io.tmpdir}/stocket-attachments}"
    max-size-bytes: 20971520
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,masterKeyProvider,attachmentStorage
  metrics:
    tags:
      application: stocket
