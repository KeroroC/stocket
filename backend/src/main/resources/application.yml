spring:
  application:
    name: stocket
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
stocket:
  identity:
    cookie:
      name: STOCKET_SESSION
      secure: true
    session:
      idle-timeout: 30d
      absolute-timeout: 90d
      touch-interval: 5m
    invite:
      default-expiry: 24h
      frontend-url: ${STOCKET_FRONTEND_URL:http://localhost:5173}
    login:
      rate-limit-window: 15m
      max-failures: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
