services:
  postgres:
    image: postgres:17.5-alpine
    user: "70:70"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    environment: !override
      POSTGRES_DB: ${POSTGRES_DB:-stocket}
      POSTGRES_USER: ${POSTGRES_USER:-stocket}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    tmpfs:
      - /run/postgresql:rw,noexec,nosuid,size=16m,uid=70,gid=70
      - /tmp:rw,noexec,nosuid,size=32m,uid=70,gid=70
    deploy:
      resources:
        limits: { cpus: "1.00", memory: 1G }
        reservations: { memory: 256M }
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

  app:
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    environment: !override
      SPRING_PROFILES_ACTIVE: production
      SPRING_CONFIG_IMPORT: optional:configtree:/run/secrets/
      STOCKET_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stocket}
      STOCKET_DB_USER: ${POSTGRES_USER:-stocket}
      STOCKET_ATTACHMENT_DIR: /var/lib/stocket/attachments
      STOCKET_FRONTEND_URL: ${STOCKET_FRONTEND_URL:?Set STOCKET_FRONTEND_URL to the public HTTPS origin}
      STOCKET_TRUSTED_PROXY_CIDRS: ${STOCKET_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
    secrets:
      - source: postgres_password
        target: STOCKET_DB_PASSWORD
      - source: master_key
        target: STOCKET_MASTER_KEY
    volumes:
      - attachment-data:/var/lib/stocket
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,uid=10001,gid=10001
    healthcheck:
      test: [CMD, curl, -fsS, http://localhost:8080/readyz]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "2.00", memory: 1G }
        reservations: { memory: 256M }
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

  gateway:
    image: stocket-gateway:${STOCKET_VERSION:-dev}
    user: "101:101"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    ports: !override
      - target: 8080
        published: "80"
        protocol: tcp
      - target: 8443
        published: "443"
        protocol: tcp
    volumes:
      - type: bind
        source: ${STOCKET_TLS_CERT_FILE:-../secrets/tls.crt}
        target: /run/tls/tls.crt
        read_only: true
      - type: bind
        source: ${STOCKET_TLS_KEY_FILE:-../secrets/tls.key}
        target: /run/tls/tls.key
        read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,uid=101,gid=101
      - /var/cache/nginx:rw,noexec,nosuid,size=32m,uid=101,gid=101
    healthcheck:
      test: [CMD-SHELL, "wget --no-check-certificate -qO- https://localhost:8443/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }
        reservations: { memory: 32M }
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

  backup:
    profiles: [operations]
    build:
      context: ..
      dockerfile: deploy/backup/Dockerfile
    image: stocket-backup:${STOCKET_VERSION:-dev}
    user: "70:70"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-stocket}
      PGUSER: ${POSTGRES_USER:-stocket}
      STOCKET_DB_PASSWORD_FILE: /run/secrets/postgres_password
      BACKUP_ROOT: /var/lib/stocket/backups
      ATTACHMENT_DIR: /var/lib/stocket/attachments
      STOCKET_VERSION: ${STOCKET_VERSION:-dev}
    secrets:
      - postgres_password
    volumes:
      - attachment-data:/var/lib/stocket:ro
      - backup-data:/var/lib/stocket/backups
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=70,gid=70
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "1.00", memory: 512M }
        reservations: { memory: 64M }
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

  restore:
    profiles: [operations]
    build:
      context: ..
      dockerfile: deploy/backup/Dockerfile
    image: stocket-backup:${STOCKET_VERSION:-dev}
    entrypoint: [/opt/stocket/backup/restore.sh]
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-stocket}
      PGUSER: ${POSTGRES_USER:-stocket}
      STOCKET_DB_PASSWORD_FILE: /run/secrets/postgres_password
      ATTACHMENT_DIR: /var/lib/stocket/attachments
    secrets:
      - postgres_password
    volumes:
      - attachment-data:/var/lib/stocket
      - backup-data:/var/lib/stocket/backups:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=10001,gid=10001
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "1.00", memory: 512M }
        reservations: { memory: 64M }
    logging:
      driver: json-file
      options: { max-size: 10m, max-file: "5" }

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-../secrets/postgres-password.txt}
  master_key:
    file: ${STOCKET_MASTER_KEY_FILE:-../secrets/master-key.txt}

volumes:
  attachment-data:
  backup-data:
