limit_req_zone $binary_remote_addr zone=public_api:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=public_connections:10m;

server {
    listen 8080;
    server_name _;
    return 308 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name _;

    include /etc/nginx/snippets/tls.conf;
    include /etc/nginx/snippets/security-headers.conf;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 21m;
    limit_conn public_connections 30;

    location ~ ^/api/v1/invites/[^/]+/(status|accept)$ {
        access_log off;
        limit_req zone=public_api burst=20 nodelay;
        proxy_pass http://app:8080;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location /api/ {
        limit_req zone=public_api burst=40 nodelay;
        proxy_pass http://app:8080;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_buffering off;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store, private" always;
    }

    location = /livez {
        proxy_pass http://app:8080/livez;
        include /etc/nginx/snippets/proxy-headers.conf;
        access_log off;
    }

    location = /readyz {
        proxy_pass http://app:8080/readyz;
        include /etc/nginx/snippets/proxy-headers.conf;
        access_log off;
    }

    location ~ ^/invite/[^/]+$ {
        access_log off;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:js|css|woff2?|png|jpe?g|webp|svg|ico)$ {
        try_files $uri =404;
        expires 1y;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }
}
