name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  jvm-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test backend
        working-directory: backend
        run: ./mvnw test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Process backend AOT
        working-directory: backend
        run: ./mvnw -Pnative spring-boot:process-aot

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example -f deploy/compose.yml config --quiet

  native-test:
    needs: jvm-and-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: Run native tests
        working-directory: backend
        run: ./mvnw -PnativeTest test

  native-compose-smoke:
    needs: jvm-and-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example -f deploy/compose.yml config --quiet

      - name: Start native Compose stack
        run: docker compose --env-file .env.example -f deploy/compose.yml up --build -d

      - name: Smoke-test system API
        run: curl --fail --retry 30 --retry-delay 5 --retry-all-errors http://localhost:8088/api/v1/system

      - name: Smoke-test readiness
        run: curl --fail --retry 30 --retry-delay 5 --retry-all-errors http://localhost:8088/actuator/health/readiness

      - name: Stop Compose stack
        if: always()
        run: docker compose --env-file .env.example -f deploy/compose.yml down
