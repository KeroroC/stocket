name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-jvm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Run backend JVM tests
        working-directory: backend
        run: ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: Test, type-check and build frontend
        working-directory: frontend
        run: npm test && npm run typecheck && npm run build

  architecture-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Verify modules and migration compatibility
        working-directory: backend
        run: ./mvnw -Dtest=ArchitectureTest,DatabaseMigrationTest,UpgradeCompatibilityTest test
  deployment-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Validate shell syntax and vulnerability waivers
        run: |
          bash -n deploy/backup/*.sh deploy/smoke/*.sh scripts/*.sh
          bash scripts/test-validate-trivyignore.sh
          python3 scripts/validate-trivyignore.py .trivyignore
      - name: Validate production Compose and Gateway policy
        run: |
          docker compose --env-file .env.example \
            -f deploy/compose.yml -f deploy/compose.production.yml \
            --profile operations config --quiet
          bash deploy/smoke/gateway-smoke.sh --static deploy/compose.production.yml
      - name: Run backup shell tests
        run: make backup-test
      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7
