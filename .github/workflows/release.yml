name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native-build:
    name: native-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: stocket
          POSTGRES_USER: stocket
          POSTGRES_PASSWORD: release-native-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stocket -d stocket"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate tag, versions and source state
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version=${GITHUB_REF_NAME#v}
          backend_version=$(cd backend && ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          frontend_version=$(node -p "require('./frontend/package.json').version")
          test "$backend_version" = "$version"
          test "$frontend_version" = "$version"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          test -z "$(git status --porcelain)"
          echo "VERSION=$version" >>"$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}" >>"$GITHUB_ENV"
      - name: Run JVM and native tests
        run: |
          mkdir -p release-logs
          cd backend
          ./mvnw test | tee ../release-logs/jvm-test-${{ matrix.arch }}.log
          ./mvnw -PnativeTest test | tee ../release-logs/native-test-${{ matrix.arch }}.log
      - name: Compile native executable
        working-directory: backend
        run: ./mvnw -Pnative -DskipTests native:compile | tee ../release-logs/native-build-${{ matrix.arch }}.log
      - name: Smoke-test native executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/stocket-attachments"
          STOCKET_DB_URL=jdbc:postgresql://localhost:5432/stocket \
          STOCKET_DB_USER=stocket STOCKET_DB_PASSWORD=release-native-test \
          STOCKET_MASTER_KEY=QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE= \
          STOCKET_ATTACHMENT_DIR="$RUNNER_TEMP/stocket-attachments" \
          SPRING_PROFILES_ACTIVE=local backend/target/stocket-backend \
            >"release-logs/native-app-${{ matrix.arch }}.log" 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do curl -fsS http://localhost:8080/readyz >/dev/null && break; sleep 2; done
          curl -fsS http://localhost:8080/api/v1/system | jq -e --arg version "$VERSION" \
            '.name == "stocket" and .version == $version' >/dev/null
          export STOCKET_SMOKE_BASE_URL=http://localhost:8080
          export STOCKET_SMOKE_STATE_FILE="$RUNNER_TEMP/release-state.json"
          export STOCKET_SMOKE_COOKIE_JAR="$RUNNER_TEMP/release-cookies.txt"
          deploy/smoke/inventory-smoke.sh seed
          rm -f "$STOCKET_SMOKE_COOKIE_JAR"
          deploy/smoke/inventory-smoke.sh verify
      - name: Build and push native architecture image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build --platform "linux/${{ matrix.arch }}" --push --provenance=false \
            -f deploy/app/Dockerfile.binary \
            --build-arg STOCKET_BINARY=backend/target/stocket-backend \
            -t "$IMAGE_REPOSITORY:$VERSION-${{ matrix.arch }}" \
            --metadata-file image-metadata.json .
          digest=$(jq -r '."containerimage.digest"' image-metadata.json)
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          mkdir -p release
          cp backend/target/stocket-backend "release/stocket-linux-${{ matrix.arch }}"
          printf '%s\n' "$digest" >"release/stocket-app-${{ matrix.arch }}.digest"
          jq -n --arg architecture "linux/${{ matrix.arch }}" \
            --arg java "$(java -version 2>&1 | head -1)" --arg runner "${{ matrix.runner }}" \
            '{architecture:$architecture,jvmTests:"passed",nativeTests:"passed",nativeSmoke:"passed",java:$java,runner:$runner}' \
            >"release/test-summary-${{ matrix.arch }}.json"
      - name: Upload architecture artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}
          path: |
            release
            release-logs
          retention-days: 14

  publish:
    needs: native-build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: downloaded
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Validate aggregate release source
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version=${GITHUB_REF_NAME#v}
          test "$(cd backend && ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)" = "$version"
          test "$(node -p "require('./frontend/package.json').version")" = "$version"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          test -z "$(git status --porcelain)"
          mkdir -p release
          find downloaded -type f -path '*/release/*' -exec cp {} release/ \;
          jq -s '{architectures:.}' release/test-summary-*.json >release/test-summary.json
          echo "VERSION=$version" >>"$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}" >>"$GITHUB_ENV"
      - name: Publish multi-architecture image index
        id: multiarch
        shell: bash
        run: |
          set -euo pipefail
          amd64_digest=$(tr -d '[:space:]' <release/stocket-app-amd64.digest)
          arm64_digest=$(tr -d '[:space:]' <release/stocket-app-arm64.digest)
          docker buildx imagetools create \
            -t "$IMAGE_REPOSITORY:$VERSION" \
            "$IMAGE_REPOSITORY@$amd64_digest" "$IMAGE_REPOSITORY@$arm64_digest"
          docker buildx imagetools inspect "$IMAGE_REPOSITORY:$VERSION" --raw \
            | jq -e '([.manifests[].platform.architecture] | sort) == ["amd64","arm64"]' >/dev/null
          digest=$(docker buildx imagetools inspect "$IMAGE_REPOSITORY:$VERSION" --format '{{.Manifest.Digest}}')
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          printf '%s\n' "$digest" >release/stocket-app-multiarch.digest
          echo "digest=$digest" >>"$GITHUB_OUTPUT"
      - name: Generate release SBOM
        uses: anchore/sbom-action@v0.20.6
        with:
          image: ${{ env.IMAGE_REPOSITORY }}:${{ env.VERSION }}
          format: spdx-json
          output-file: release/stocket-app.spdx.json
          upload-artifact: false
      - name: Scan release image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ env.VERSION }}
          format: json
          output: release/trivy-release.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Sign images and attest SBOM
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg workflow "$GITHUB_WORKFLOW" --arg runId "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" --arg commit "$GITHUB_SHA" \
            '{predicateType:"https://slsa.dev/provenance/v1",workflow:$workflow,runId:$runId,repository:$repository,commit:$commit}' \
            >release/provenance.json
          for digest_file in release/stocket-app-*.digest; do
            digest=$(tr -d '[:space:]' <"$digest_file")
            cosign sign --yes "$IMAGE_REPOSITORY@$digest"
            cosign attest --yes --type spdxjson --predicate release/stocket-app.spdx.json \
              "$IMAGE_REPOSITORY@$digest"
            cosign attest --yes --type slsaprovenance --predicate release/provenance.json \
              "$IMAGE_REPOSITORY@$digest"
          done
      - name: Attest multi-architecture image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.multiarch.outputs.digest }}
          push-to-registry: true
      - name: Generate and verify release manifest
        shell: bash
        env:
          COSIGN_CERTIFICATE_IDENTITY_REGEXP: ^https://github.com/${{ github.repository }}/.github/workflows/release\.yml@refs/tags/${{ github.ref_name }}$
        run: |
          set -euo pipefail
          deploy/release/generate-manifest.sh release "$GITHUB_REF_NAME" "$GITHUB_SHA" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$IMAGE_REPOSITORY" true
          deploy/release/verify-release.sh release "$GITHUB_REF_NAME"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
