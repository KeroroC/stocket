name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Validate tag, versions and source state
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version=${GITHUB_REF_NAME#v}
          test "$(cd backend && ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)" = "$version"
          test "$(node -p "require('./frontend/package.json').version")" = "$version"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          test -z "$(git status --porcelain)"
          echo "VERSION=$version" >>"$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}" >>"$GITHUB_ENV"
      - name: Run backend tests
        run: cd backend && ./mvnw test
      - name: Build and push multi-architecture image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.VERSION }}
      - name: Record and verify image platforms
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          digest='${{ steps.image.outputs.digest }}'
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          printf '%s\n' "$digest" >release/stocket-app-multiarch.digest
          docker buildx imagetools inspect "$IMAGE_REPOSITORY:$VERSION" --raw \
            | jq -e '([.manifests[].platform.architecture] | sort) == ["amd64","arm64"]' >/dev/null
          jq -n --arg java "$(java -version 2>&1 | head -1)" \
            '{jvmTests:"passed",containerPlatforms:["linux/amd64","linux/arm64"],java:$java}' \
            >release/test-summary.json
      - name: Generate release SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.IMAGE_REPOSITORY }}:${{ env.VERSION }}
          format: spdx-json
          output-file: release/stocket-app.spdx.json
          upload-artifact: false
      - name: Scan release image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ env.VERSION }}
          format: json
          output: release/trivy-release.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Sign image and attest metadata
        shell: bash
        run: |
          set -euo pipefail
          digest=$(tr -d '[:space:]' <release/stocket-app-multiarch.digest)
          jq -n --arg workflow "$GITHUB_WORKFLOW" --arg runId "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" --arg commit "$GITHUB_SHA" \
            '{predicateType:"https://slsa.dev/provenance/v1",workflow:$workflow,runId:$runId,repository:$repository,commit:$commit}' \
            >release/provenance.json
          cosign sign --yes "$IMAGE_REPOSITORY@$digest"
          cosign attest --yes --type spdxjson --predicate release/stocket-app.spdx.json \
            "$IMAGE_REPOSITORY@$digest"
          cosign attest --yes --type slsaprovenance --predicate release/provenance.json \
            "$IMAGE_REPOSITORY@$digest"
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
      - name: Generate and verify release manifest
        shell: bash
        env:
          COSIGN_CERTIFICATE_IDENTITY_REGEXP: ^https://github.com/${{ github.repository }}/.github/workflows/release\.yml@refs/tags/${{ github.ref_name }}$
        run: |
          set -euo pipefail
          deploy/release/generate-manifest.sh release "$GITHUB_REF_NAME" "$GITHUB_SHA" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$IMAGE_REPOSITORY" true
          deploy/release/verify-release.sh release "$GITHUB_REF_NAME"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
